# 1. Define the Rate Limiting Memory Zone (Tracks IPs; allows 5 requests per second)
limit_req_zone $binary_remote_addr zone=http_rate_limit:10m rate=5r/s;

upstream my_backend_cluster {
    server 192.168.56.101:80;
    server 192.168.56.102:80;
}

# 2. HTTP Redirect Block (Forces HTTPS)
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# 3. HTTPS Secure Hardened Proxy Block
server {
    listen 443 ssl;
    server_name localhost;

    # SSL Asset Paths
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Cryptographic Protocol Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Information Disclosure Protection
    server_tokens off;

    # Enterprise Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        # Apply the Rate Limiting Zone here
        limit_req zone=http_rate_limit burst=10 nodelay;

        # Core Proxy Redirection Engine
        proxy_pass http://my_backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}